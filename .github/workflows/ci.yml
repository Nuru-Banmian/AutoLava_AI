name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      AUTOLAVA_DATABASE_PATH: /tmp/autolava-ci.sqlite3
      AUTOLAVA_JWT_SECRET: ci-only-jwt-secret-with-at-least-32-bytes
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install aiosqlite -e ".[dev]"
      - run: alembic upgrade head
      - run: ruff check .
      - run: pytest --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  containers:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      AUTOLAVA_JWT_SECRET: ci-placeholder-jwt-secret-with-at-least-32-bytes
      AUTOLAVA_COOKIE_SECURE: "false"
      AUTOLAVA_BOOTSTRAP_USERNAME: ci-placeholder-admin
      AUTOLAVA_BOOTSTRAP_PASSWORD: ci-placeholder-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend assets
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - run: docker compose config
      - name: Build release images
        run: |
          docker build -t autolava-api:latest backend
          docker build -t autolava-web:latest -f frontend/Dockerfile.prebuilt frontend
      - name: Export release images
        run: |
          docker save autolava-api:latest | gzip -1 > autolava-api.tar.gz
          docker save autolava-web:latest | gzip -1 > autolava-web.tar.gz
      - name: Upload release images
        uses: actions/upload-artifact@v4
        with:
          name: autolava-release-images-${{ github.sha }}
          path: |
            autolava-api.tar.gz
            autolava-web.tar.gz
          retention-days: 3
          compression-level: 0
      - run: docker compose up -d --no-build
      - run: docker compose exec -T autolava-web nginx -t
      - name: Wait for proxied API health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - name: Bootstrap, login, and verify SQLite persistence
        shell: bash
        run: |
          set -euo pipefail
          docker compose exec -T autolava-api python -m app.scripts.create_admin

          login() {
            local payload response
            payload="$(jq -cn \
              --arg username "$AUTOLAVA_BOOTSTRAP_USERNAME" \
              --arg password "$AUTOLAVA_BOOTSTRAP_PASSWORD" \
              '{username: $username, password: $password}')"
            response="$(curl --fail-with-body --silent --show-error \
              --header "Content-Type: application/json" \
              --data "$payload" \
              http://127.0.0.1/api/auth/login)"
            jq -e --arg username "$AUTOLAVA_BOOTSTRAP_USERNAME" \
              '.username == $username' <<<"$response" >/dev/null
          }

          login
          docker compose up -d --no-build --force-recreate autolava-api
          docker compose restart autolava-web
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1/health; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              exit 1
            fi
            sleep 2
          done
          login
      - name: Verify manual SQLite online backup
        run: |
          docker compose exec -T autolava-api python - <<'PY'
          from datetime import date

          from app.core.config import get_settings
          from app.services.sqlite_backup import backup_sqlite, has_valid_backup

          settings = get_settings()
          today = date.today()
          expected = settings.backup_directory / f"autolava-{today:%Y%m%d}.sqlite3"
          actual = backup_sqlite(settings.database_path, settings.backup_directory, today)
          if (
              actual != expected
              or not expected.is_file()
              or not has_valid_backup(settings.backup_directory, today)
          ):
              raise SystemExit("manual SQLite backup verification failed")
          print(expected.name)
          PY
      - name: Container diagnostics and cleanup
        if: always()
        run: |
          docker compose logs --no-color || true
          docker compose down --volumes --remove-orphans
